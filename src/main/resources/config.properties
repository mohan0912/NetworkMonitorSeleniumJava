# ============================================================
# PassiveNetworkMonitor Configuration
# ============================================================
# All properties can be overridden via system properties
# e.g., -Dnetwork.passive.capture.enabled=true

# Enable/disable passive network capture
network.passive.capture.enabled=true

# Comma-separated API endpoint patterns to capture (substring match)
# Leave empty to capture all APIs
# Each matching API is written to Excel immediately upon capture
network.capture.apis=/login,/cart,/checkout

# Comma-separated HTTP methods to capture (case-insensitive)
# Leave empty to capture all methods
network.capture.methods=GET,POST

# Comma-separated HTTP status codes to capture
# Leave empty to capture all status codes
network.capture.status.codes=200,400,500

# Path to the output Excel report file
# Each API call is saved to disk immediately ? no data loss on crash
network.excel.path=./reports/network.xlsx

# Polling interval in milliseconds (how often to drain browser logs)
# Simultaneous API calls within the same poll window are all captured
network.capture.poll.interval.ms=2000


# Sheet name in Excel workbook
network.excel.sheet.name=Network Logs

# ============================================================
# SmartWaitEngine Configuration
# ============================================================
# All properties can be overridden via system properties
# e.g., -Dsmartawait.timeout.seconds=60

# Maximum wait timeout in seconds
smartwait.timeout.seconds=30

# Polling interval in milliseconds
smartwait.polling.millis=500

# Duration (ms) of no DOM mutations required to consider the DOM stable
smartwait.dom.stable.millis=1000

# Duration (ms) of no network activity required to consider network idle
smartwait.network.idle.millis=1000

# CSS selector for spinner/loader elements (leave empty to skip)
# smartwait.spinner.locator.css=.spinner, .loader, [data-loading="true"]

# Enable/disable JS error absence check (set false if third-party scripts throw errors)
smartwait.js.errors.enabled=true

# Enable jQuery.active === 0 check (only if your app uses jQuery AJAX)
smartwait.jquery.wait.enabled=false

# Enable Angular testability stability check (only if your app uses Angular v2+)
smartwait.angular.wait.enabled=false

